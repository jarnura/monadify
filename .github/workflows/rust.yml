name: CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

env:
  CARGO_TERM_COLOR: always

jobs:
  fmt:
    name: rustfmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - name: Check formatting
        run: cargo fmt --all -- --check

  clippy:
    name: clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - name: Lint lib & bins (deny warnings)
        run: cargo clippy --all-features -- -D warnings
      # Guards benches/compare.rs from silently rotting (e.g. stale marker names).
      - name: Lint benches (deny warnings)
        run: cargo clippy --all-features --benches -- -D warnings

  test:
    name: test (${{ matrix.name }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: default
            flags: ""
          - name: legacy
            flags: "--features legacy"
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Build
        run: cargo build --verbose ${{ matrix.flags }}
      # `cargo test` runs unit, integration, and doc-tests.
      - name: Test
        run: cargo test --verbose ${{ matrix.flags }}

  msrv:
    name: msrv (1.66)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.66.0
      - uses: Swatinem/rust-cache@v2
      # Check the library against the declared MSRV (Cargo.toml `rust-version`).
      - name: Check
        run: cargo check --all-features --verbose
